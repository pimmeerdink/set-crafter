---
# Run with: uv run ops deploy --env production [target]
- name: Deploy
  hosts: servers
  become: false

  tasks:
    - name: Deploy api
      tags: [api]
      block:
        # python_app's "Ensure app directory exists" runs without become, so
        # it can't write under /opt. Pre-create it with the right ownership.
        - name: Ensure /opt/<api app> exists
          ansible.builtin.file:
            path: "/opt/{{ targets.api.app_name }}"
            state: directory
            owner: deploy
            group: deploy
            mode: "0755"
          become: true

        # python_app's "Set repository permissions" recursively chowns the
        # repo dir and follows symlinks, which means it chases .venv/bin/python
        # → /usr/bin/python3 and fails. Remove .venv before that runs; uv sync
        # will recreate it afterwards.
        - name: Remove stale .venv before chown
          ansible.builtin.file:
            path: "/opt/{{ targets.api.app_name }}/repo/.venv"
            state: absent
          become: true

        - name: Deploy set-crafter API
          include_role:
            name: socialtechnologylab.stl.python_app
          vars:
            python_app_name: "{{ targets.api.app_name }}"
            python_app_repo: "{{ env.GITHUB_REPO }}"
            python_app_branch: "{{ branch | default('main') }}"
            python_app_module: "{{ targets.api.module }}"
            python_app_use_uv_run: true
            python_app_env_template: "set-crafter-api.env.j2"
            python_app_health_endpoint: "/docs"
            # set-crafter has no database — skip the default alembic command
            python_app_migration_command: ""

    - name: Deploy web
      tags: [web]
      vars:
        app_dir: "/opt/{{ targets.web.app_name }}"
      block:
        - name: Ensure app directory exists
          ansible.builtin.file:
            path: "{{ app_dir }}"
            state: directory
            owner: deploy
            group: deploy
            mode: "0755"
          become: true

        - name: Ensure web directory exists
          ansible.builtin.file:
            path: "{{ targets.web.web_dir }}"
            state: directory
            owner: deploy
            group: www-data
            mode: "0755"
          become: true

        - name: Ensure GitHub access
          include_role:
            name: socialtechnologylab.stl.ensure_github_access
          vars:
            ensure_github_access_repo: "{{ env.GITHUB_REPO }}"
            ensure_github_access_user: deploy
            ensure_github_access_github_token: "{{ env.GITHUB_TOKEN | default('') }}"

        - name: Checkout latest source
          include_role:
            name: socialtechnologylab.stl.git_deploy
            tasks_from: checkout.yml
          vars:
            git_repo: "{{ env.GITHUB_REPO }}"
            git_branch: "{{ branch | default('main') }}"
            git_dest: "{{ app_dir }}"
            git_user: deploy

        - name: Install frontend dependencies
          ansible.builtin.shell:
            cmd: pnpm install --frozen-lockfile
            chdir: "{{ app_dir }}/web"
          become: true
          become_user: deploy
          changed_when: true

        # `pnpm build` runs `astro check && astro build`, but the existing
        # Crafter.astro has TypeScript errors (Alpine.js patterns that the
        # checker doesn't understand). Skip the check on prod builds — the
        # build itself produces correct output.
        - name: Build Astro static site
          ansible.builtin.shell:
            cmd: pnpm exec astro build
            chdir: "{{ app_dir }}/web"
          environment:
            PUBLIC_API_BASE: "https://{{ targets.api.domain }}"
          become: true
          become_user: deploy
          changed_when: true

        - name: Publish built site to web root
          ansible.posix.synchronize:
            src: "{{ app_dir }}/web/dist/"
            dest: "{{ targets.web.web_dir }}/"
            delete: true
            recursive: true
          delegate_to: "{{ inventory_hostname }}"

        - name: Set permissions on web root
          ansible.builtin.file:
            path: "{{ targets.web.web_dir }}"
            owner: deploy
            group: www-data
            mode: "0755"
            recurse: true
          become: true
